services:
  # --- 后端 API ---
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - HF_ENDPOINT=https://hf-mirror.com
    depends_on:
      - chromadb
      - redis
    volumes:
      - ./knowledge:/app/knowledge

  # --- 前端 ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - BACKEND_URL=http://app:8000
    depends_on:
      - app

  # --- 向量数据库 ---
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8500:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  # --- MCP Server ---
  mcp-server:
    build: .
    command: python -m src.tools.mcp_server
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      - chromadb

  # --- 缓存 / 消息队列 ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # --- 反向代理 ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - app

volumes:
  chroma_data:
  redis_data:
