services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-viral_video}
      POSTGRES_USER: ${POSTGRES_USER:-viral_video}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-dev-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-viral_video} -d ${POSTGRES_DB:-viral_video}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - redis_data:/data

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8500:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/chroma/chroma

  mcp-server:
    build: .
    command: python -m src.tools.mcp_server
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      HF_ENDPOINT: https://hf-mirror.com
      ENABLE_MOCK_TOOLS: ${ENABLE_MOCK_TOOLS:-false}
      ENABLE_INTERACTIVE_BRIEF: ${ENABLE_INTERACTIVE_BRIEF:-false}
    depends_on:
      - chromadb
    volumes:
      - embedding_cache:/root/.cache/chroma

  app:
    build: .
    command: sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-at-least-32-bytes}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-viral_video}:${POSTGRES_PASSWORD:-local-dev-change-me}@postgres:5432/${POSTGRES_DB:-viral_video}
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      HF_ENDPOINT: https://hf-mirror.com
      MCP_SERVER_URL: http://mcp-server:8001/sse
      USE_FINETUNED_MODEL: ${USE_FINETUNED_MODEL:-false}
      FINETUNED_MODEL_URL: ${FINETUNED_MODEL_URL:-http://host.docker.internal:8002/v1}
      GRAPH_VERSION: ${GRAPH_VERSION:-v2}
      ENABLE_MOCK_TOOLS: ${ENABLE_MOCK_TOOLS:-false}
      ENABLE_INTERACTIVE_BRIEF: ${ENABLE_INTERACTIVE_BRIEF:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      mcp-server:
        condition: service_started
    volumes:
      - ./knowledge:/app/knowledge:ro
      - embedding_cache:/root/.cache/chroma

  worker:
    build: .
    command: arq src.worker.WorkerSettings
    env_file: .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-at-least-32-bytes}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-viral_video}:${POSTGRES_PASSWORD:-local-dev-change-me}@postgres:5432/${POSTGRES_DB:-viral_video}
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      MCP_SERVER_URL: http://mcp-server:8001/sse
      USE_FINETUNED_MODEL: ${USE_FINETUNED_MODEL:-false}
      FINETUNED_MODEL_URL: ${FINETUNED_MODEL_URL:-http://host.docker.internal:8002/v1}
      GRAPH_VERSION: ${GRAPH_VERSION:-v2}
      ENABLE_MOCK_TOOLS: ${ENABLE_MOCK_TOOLS:-false}
      WORKER_MAX_JOBS: ${WORKER_MAX_JOBS:-2}
      JOB_TIMEOUT_SECONDS: ${JOB_TIMEOUT_SECONDS:-600}
      DISPATCH_RECONCILE_MIN_AGE_SECONDS: ${DISPATCH_RECONCILE_MIN_AGE_SECONDS:-60}
      DISPATCH_RECONCILE_BATCH_SIZE: ${DISPATCH_RECONCILE_BATCH_SIZE:-50}
      ASR_MAX_VIDEOS: ${ASR_MAX_VIDEOS:-5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-server:
        condition: service_started
    volumes:
      - ./knowledge:/app/knowledge:ro
      - embedding_cache:/root/.cache/chroma

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://app:8000
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://app:8000
    depends_on:
      - app

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - app

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  embedding_cache:
